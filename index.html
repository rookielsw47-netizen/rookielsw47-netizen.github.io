<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로고운</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #fff9f5;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      padding: 60px 40px;
    }

    .brand {
      font-size: 52px;
      font-weight: 700;
      color: #e8a598;
      letter-spacing: 8px;
      margin-bottom: 20px;
    }

    .slogan {
      font-size: 16px;
      color: #b0917f;
      letter-spacing: 2px;
      margin-bottom: 60px;
      line-height: 1.8;
    }

    .divider {
      width: 40px;
      height: 2px;
      background-color: #f5c9bc;
      margin: 0 auto 60px;
    }

    .contact {
      font-size: 15px;
      color: #c4a090;
      letter-spacing: 1px;
    }

    .contact a {
      color: #c4a090;
      text-decoration: none;
    }

    .contact a:hover {
      color: #e8a598;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">로고운</div>
    <div class="slogan">짧은 순간을 아름답게<br>가성비 아이템들</div>
    <div class="divider"></div>
    <div class="contact">
      <a href="tel:010-4151-8385">010-4151-8385</a>
    </div>
  </div>
</body>
</html>
